kind = "web"
previewPath = "/"
title = "Customer App"
version = "1.0.0"
id = "artifacts/customer"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24173

[services.development]
run = "pnpm --filter @workspace/customer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/customer", "run", "build" ]
serve = "static"
publicDir = "artifacts/customer/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24173"
BASE_PATH = "/"
