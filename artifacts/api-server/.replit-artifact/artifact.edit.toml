kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.env]
PORT = "8080"

[services.production]

[services.production.build]
args = ["bash", "-c", "cd backend && go build -o ../artifacts/api-server/avex-server ./cmd/server"]

[services.production.build.env]
CGO_ENABLED = "0"
GOOS = "linux"

[services.production.run]
args = ["artifacts/api-server/avex-server"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api/health"
