kind = "web"
previewPath = "/support/"
title = "Support App"
version = "1.0.0"
id = "artifacts/support"
router = "path"

[[services]]
name = "web"
paths = [ "/support/" ]
localPort = 22770

[services.development]
run = "pnpm --filter @workspace/support run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/support", "run", "build" ]
serve = "static"
publicDir = "artifacts/support/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22770"
BASE_PATH = "/support/"
